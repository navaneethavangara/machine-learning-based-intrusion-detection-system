<!DOCTYPE html>
<html>
<head>
<title>Security Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    background:#0b123b;
    color:white;
    font-family:Arial;
    padding:20px;
}

/* CARDS */
.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    flex:1;
    padding:25px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card-text{
    font-size:18px;
}

.card h2{
    margin-top:10px;
    font-size:28px;
}

.card i{
    font-size:30px;
    opacity:0.8;
}

.threat{background:linear-gradient(135deg,#ff4b2b,#ff416c);}
.confidence{background:linear-gradient(135deg,#11998e,#38ef7d);}
.uptime{background:linear-gradient(135deg,#396afc,#2948ff);}

/* TABLES */
.monitor-container{
    display:flex;
    gap:30px;
}

.monitor-box{
    flex:1;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #2c3e50;
}

th{
    background:#2d3f5f;
}

.attack{
    color:red;
    font-weight:bold;
}

.normal{
    color:#38ef7d;
    font-weight:bold;
}

h1{
    margin-bottom:25px;
}
</style>
</head>

<body>

<h1><i class="fa-solid fa-shield-halved"></i> Security Dashboard</h1>

<!-- TOP CARDS -->
<div class="cards">

<div class="card threat">
<div class="card-text">
Active Threats
<h2 id="threatCount">0</h2>
</div>
<i class="fa-solid fa-triangle-exclamation"></i>
</div>

<div class="card confidence">
<div class="card-text">
ML Confidence
<h2 id="confidenceValue">0%</h2>
</div>
<i class="fa-solid fa-brain"></i>
</div>

<div class="card uptime">
<div class="card-text">
System Uptime
<h2 id="uptimeValue">0%</h2>
</div>
<i class="fa-solid fa-heart-pulse"></i>
</div>

</div>

<h2><i class="fa-solid fa-chart-line"></i> Real-Time Monitoring</h2>

<div class="monitor-container">

<div class="monitor-box">
<h3>Supervised Learning</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Time</th>
<th>Features</th>
<th>Prediction</th>
<th>Confidence</th>
</tr>
</thead>
<tbody id="supervisedTable"></tbody>
</table>
</div>

<div class="monitor-box">
<h3>Unsupervised Learning</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Time</th>
<th>Features</th>
<th>Cluster</th>
</tr>
</thead>
<tbody id="unsupervisedTable"></tbody>
</table>
</div>

</div>

<script>

function loadDashboard(){
fetch('/api/dashboard_data')
.then(res => res.json())
.then(data => {

document.getElementById("threatCount").innerText = data.active_threats;
document.getElementById("confidenceValue").innerText = data.ml_confidence + "%";
document.getElementById("uptimeValue").innerText = data.uptime + "%";

let supTable = document.getElementById("supervisedTable");
supTable.innerHTML = "";

data.supervised.forEach(row => {
supTable.innerHTML += `
<tr>
<td>${row.id}</td>
<td>${row.time}</td>
<td>${row.features}</td>
<td class="${row.prediction=='Attack'?'attack':'normal'}">
${row.prediction}
</td>
<td>${row.confidence}%</td>
</tr>`;
});

let unsupTable = document.getElementById("unsupervisedTable");
unsupTable.innerHTML = "";

data.unsupervised.forEach(row => {
unsupTable.innerHTML += `
<tr>
<td>${row.id}</td>
<td>${row.time}</td>
<td>${row.features}</td>
<td>${row.cluster}</td>
</tr>`;
});

});
}

setInterval(loadDashboard,2000);

</script>

</body>
</html>
